name: Continue Tag Collection

on:
  workflow_dispatch:
    inputs:
      delay:
        description: 'Delay between requests (seconds)'
        required: false
        default: '0.5'
      save_interval:
        description: 'Save progress every N videos'
        required: false
        default: '50'

jobs:
  continue:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install curl_cffi beautifulsoup4
    
    - name: Create cookies.json
      env:
        COOKIES_JSON: ${{ secrets.COOKIES }}
      run: echo "$COOKIES_JSON" > cookies.json
    
    - name: Download previous progress
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: tag-progress
        path: ./
    
    - name: Run collector
      run: |
        python continue.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: tag-progress
        path: |
          collector_progress.json
          tags_updated.json
          new_tags.txt
        retention-days: 90