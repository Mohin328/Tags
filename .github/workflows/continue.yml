name: Continue Tag Collection

on:
  workflow_dispatch:
    inputs:
      request_delay:
        description: 'Delay between requests (seconds)'
        required: false
        default: '0.3'
        type: string
      save_interval:
        description: 'Save progress every N videos'
        required: false
        default: '50'
        type: string
      max_videos:
        description: 'Max videos this run (0 = unlimited)'
        required: false
        default: '0'
        type: string

jobs:
  continue:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5 hours
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install curl_cffi beautifulsoup4
    
    - name: Create cookies.json from secret
      env:
        COOKIES_JSON: ${{ secrets.COOKIES }}
      run: echo "$COOKIES_JSON" > cookies.json
    
    - name: Download previous progress
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: tag-collection-progress
        path: ./
    
    - name: Show progress
      run: |
        if [ -f "collector_progress.json" ]; then
          PROCESSED=$(jq '.processed_videos | length' collector_progress.json)
          TOTAL=$(jq '.video_queue | length' collector_progress.json)
          echo "📊 Progress: $PROCESSED / $TOTAL videos"
          echo "PROCESSED=$PROCESSED" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
        else
          echo "⚠ No progress file found"
        fi
    
    - name: Run collector
      env:
        REQUEST_DELAY: ${{ github.event.inputs.request_delay || '0.3' }}
        SAVE_INTERVAL: ${{ github.event.inputs.save_interval || '50' }}
        MAX_VIDEOS: ${{ github.event.inputs.max_videos || '0' }}
      run: |
        echo "Starting at $(date)"
        python continue.py
      continue-on-error: true
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: tag-collection-progress
        path: |
          collector_progress.json
          tags_updated.json
          new_tags.txt
          collection_report.json
        retention-days: 90
    
    - name: Show summary
      if: always()
      run: |
        echo "## Collection Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "collection_report.json" ]; then
          cat collection_report.json >> $GITHUB_STEP_SUMMARY
        fi
        if [ -f "new_tags.txt" ]; then
          COUNT=$(wc -l < new_tags.txt)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**New tags found:** $COUNT" >> $GITHUB_STEP_SUMMARY
        fi