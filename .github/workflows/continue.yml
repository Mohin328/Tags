name: Continue Tag Collection with Selenium

on:
  workflow_dispatch:
    inputs:
      delay:
        description: 'Delay between requests (seconds)'
        required: false
        default: '1.0'
      save_interval:
        description: 'Save progress every N videos'
        required: false
        default: '50'

jobs:
  continue:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Chrome and ChromeDriver
      run: |
        # Install Chrome
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
        # Install ChromeDriver
        CHROME_VERSION=$(google-chrome --version | awk '{print $3}' | cut -d '.' -f 1-3)
        wget -q "https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
        unzip chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
        sudo chmod +x /usr/local/bin/chromedriver
        
        # Verify installations
        google-chrome --version
        chromedriver --version
    
    - name: Install dependencies
      run: |
        pip install selenium beautifulsoup4
    
    - name: Create cookies.json from secret
      env:
        COOKIES_JSON: ${{ secrets.COOKIES }}
      run: echo "$COOKIES_JSON" > cookies.json
    
    - name: Download previous progress
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: tag-progress-selenium
        path: ./
    
    - name: Show current progress
      run: |
        if [ -f "collector_progress.json" ]; then
          PROCESSED=$(python -c "import json; d=open('collector_progress.json').read(); print(len(json.loads(d).get('processed_videos', [])))")
          TOTAL=$(python -c "import json; d=open('collector_progress.json').read(); print(len(json.loads(d).get('video_queue', [])))")
          echo "📊 Progress: $PROCESSED / $TOTAL videos"
        fi
    
    - name: Run Selenium collector
      run: |
        echo "Starting at $(date)"
        python continue_selenium.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: tag-progress-selenium
        path: |
          collector_progress.json
          tags_updated.json
          new_tags.txt
        retention-days: 90
    
    - name: Show summary
      if: always()
      run: |
        echo "## Collection Results" >> $GITHUB_STEP_SUMMARY
        if [ -f "new_tags.txt" ]; then
          COUNT=$(wc -l < new_tags.txt)
          echo "**New tags found:** $COUNT" >> $GITHUB_STEP_SUMMARY
        fi