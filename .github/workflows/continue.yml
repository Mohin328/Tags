name: Continue Tag Collection with Selenium

on:
  workflow_dispatch:
    inputs:
      delay:
        description: 'Delay between requests (seconds)'
        required: false
        default: '1.0'
      save_interval:
        description: 'Save progress every N videos'
        required: false
        default: '50'

jobs:
  continue:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Chrome
      run: |
        sudo apt update
        sudo apt install -y chromium-browser chromium-chromedriver
    
    - name: Install dependencies
      run: |
        pip install selenium beautifulsoup4
    
    - name: Create cookies.json from secret
      env:
        COOKIES_JSON: ${{ secrets.COOKIES }}
      run: echo "$COOKIES_JSON" > cookies.json
    
    - name: Download previous progress
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: tag-progress-selenium
        path: ./
    
    - name: Show current progress
      run: |
        if [ -f "collector_progress.json" ]; then
          PROCESSED=$(python -c "import json; d=open('collector_progress.json').read(); print(len(json.loads(d).get('processed_videos', [])))")
          TOTAL=$(python -c "import json; d=open('collector_progress.json').read(); print(len(json.loads(d).get('video_queue', [])))")
          echo "📊 Progress: $PROCESSED / $TOTAL videos"
          echo "PROCESSED=$PROCESSED" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
        fi
    
    - name: Run Selenium collector
      env:
        CHROME_BIN: /usr/bin/chromium-browser
        CHROMEDRIVER_PATH: /usr/bin/chromedriver
      run: |
        echo "Starting at $(date)"
        python continue_selenium.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: tag-progress-selenium
        path: |
          collector_progress.json
          tags_updated.json
          new_tags.txt
        retention-days: 90
    
    - name: Show summary
      if: always()
      run: |
        echo "## Collection Results" >> $GITHUB_STEP_SUMMARY
        if [ -f "new_tags.txt" ]; then
          COUNT=$(wc -l < new_tags.txt)
          echo "**New tags found:** $COUNT" >> $GITHUB_STEP_SUMMARY
        fi